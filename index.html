<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>360度全景瀏覽器</title>
    
    <!-- 引入 Pannellum 的 CSS 樣式表 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    
    <style>
        /* 讓網頁滿版顯示，沒有白邊 */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        /* 設定全景圖容器的大小 */
        #panorama {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>

    <!-- 這是用來裝載全景圖的區塊 -->
    <div id="panorama"></div>

    <!-- 引入 Pannellum 的 JavaScript 核心檔案 -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    
    <script>
        // 初始化全景圖
        pannellum.viewer('panorama', {
            "type": "equirectangular", // 圖片類型：等距柱狀投影（即你的圖片格式）
            "panorama": "Weixin Image_20260422214720_15_124.jpg",    // 【重要】這裡換成你的圖片檔案名稱！如果在同一個資料夾就直接寫檔名
            "autoLoad": true,          // 自動載入
            "autoRotate": -2,          // 自動旋轉速度（負數為向右旋轉，設定為 0 則不自動旋轉）
            "compass": false,          // 是否顯示指南針
            "showControls": true       // 是否顯示縮放與全螢幕控制按鈕
        });
    </script>

</body>
</html>
